name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional release tag override. Defaults to v<tauri version>.
        required: false
        type: string
      release_name:
        description: Release title.
        required: false
        type: string
      release_notes:
        description: Release notes.
        required: false
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      release_notes: ${{ steps.release.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve release metadata
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: node scripts/release_version.mjs --github-output "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS universal
    runs-on: macos-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: npm ci
      - name: Check updater signing key secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required."
            exit 1
          fi
      - name: Build Tauri app
        shell: bash
        run: |
          for ATTEMPT in 1 2 3; do
            if npm run tauri -- build --target universal-apple-darwin --bundles app,dmg; then
              exit 0
            fi
            if [ "$ATTEMPT" = "3" ]; then
              exit 1
            fi
            sleep $((ATTEMPT * 20))
          done
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          if-no-files-found: error
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Check updater signing key secret
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required."
          }
      - name: Build Tauri app
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt += 1) {
            npm run tauri -- build --bundles nsis
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -eq $maxAttempts) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds ($attempt * 20)
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*setup.exe
            src-tauri/target/release/bundle/nsis/*setup.exe.sig

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build-macos
      - build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
      - name: Generate latest.json
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_NOTES: ${{ needs.preflight.outputs.release_notes }}
        run: >
          node scripts/generate_latest_json.mjs
          --repo "$GITHUB_REPOSITORY"
          --tag "$TAG"
          --version "$VERSION"
          --artifacts dist/release-assets
          --output dist/latest.json
          --notes "$RELEASE_NOTES"
      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_NAME: ${{ needs.preflight.outputs.release_name }}
          RELEASE_NOTES: ${{ needs.preflight.outputs.release_notes }}
        run: |
          mapfile -d '' ASSETS < <(find dist/release-assets -type f -print0)
          ASSETS+=(dist/latest.json)
          if gh release view "$TAG" >/dev/null 2>&1; then
            mapfile -t EXISTING_ASSETS < <(gh release view "$TAG" --json assets --jq '.assets[].name')
            for ASSET in "${EXISTING_ASSETS[@]}"; do
              gh release delete-asset "$TAG" "$ASSET" --yes
            done
            gh release upload "$TAG" "${ASSETS[@]}"
            gh release edit "$TAG" --title "$RELEASE_NAME" --notes "$RELEASE_NOTES" --latest
          else
            gh release create "$TAG" "${ASSETS[@]}" --title "$RELEASE_NAME" --notes "$RELEASE_NOTES" --latest
          fi
